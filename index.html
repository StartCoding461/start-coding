<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MathBot PRO++</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#app{
  width:95%;
  max-width:500px;
  background:#1c1c1c;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#top{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#111;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  cursor:pointer;
}

.active{background:#0b84ff;}

#messages{
  height:200px;
  overflow-y:auto;
  padding:10px;
  background:#222;
}

.msg{
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  max-width:80%;
}

.user{background:#0b84ff; align-self:flex-end;}
.bot{background:#333;}

#display{
  padding:15px;
  background:#000;
  color:#0f0;
  font-size:22px;
  text-align:right;
}

#pad{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:10px;
  background:#111;
}

.key{
  padding:18px;
  font-size:18px;
  background:#333;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.key:hover{
  background:#0b84ff;
}
</style>
</head>

<body>

<div id="app">

<div id="top">
<button class="active" onclick="setLevel('easy',this)">Easy</button>
<button onclick="setLevel('medium',this)">Medium</button>
<button onclick="setLevel('hard',this)">Hard</button>
</div>

<div id="messages"></div>

<div id="display">0</div>

<div id="pad"></div>

</div>

<script>

let level="easy";
let input="";

const display=document.getElementById("display");
const messages=document.getElementById("messages");

// ===== MESSAGE =====
function add(text,type){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.textContent=text;
  messages.appendChild(d);
  messages.scrollTop=messages.scrollHeight;
}

// ===== LEVEL =====
function setLevel(l,btn){
  level=l;
  document.querySelectorAll("#top button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  add("📊 Level: "+l,"bot");
}

// ===== KEYPAD =====
const keys=[
"7","8","9","/",
"4","5","6","*",
"1","2","3","-",
"0",".","(",")",
"+","C","="];

const pad=document.getElementById("pad");

keys.forEach(k=>{
  const b=document.createElement("div");
  b.className="key";
  b.textContent=k;
  b.onclick=()=>press(k);
  pad.appendChild(b);
});

// ===== ACTION =====
function press(k){

  if(k==="C"){
    input="";
  }
  else if(k==="="){
    calculate();
    return;
  }
  else{
    input+=k;
  }

  display.textContent=input || "0";
}

// ===== CALCUL =====
function calculate(){
  try{
    let result=Function("return "+input)();

    add("🧮 "+input,"user");
    add("✅ Result: "+result,"bot");

    input="";
    display.textContent="0";

  }catch{
    add("❌ Error in calculation","bot");
    input="";
    display.textContent="0";
  }
}

// START
add("🔥 MathBot PRO++ ready. Use the keypad.","bot");

</script>

</body>
</html>
