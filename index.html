<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MathBot PRO++</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

#chat{
  width:95%;
  max-width:1100px;
  height:90%;
  background:#1a1a1a;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#top{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#111;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:12px;
  background:#333;
  color:white;
  cursor:pointer;
}

button.active{background:#0b84ff}

#messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  background:#222;
}

.message{
  margin:8px 0;
  padding:12px 18px;
  border-radius:20px;
  max-width:80%;
  white-space:pre-line;
}

.user{background:#0b84ff; align-self:flex-end}
.bot{background:#333; align-self:flex-start}

#inputArea{
  display:flex;
  padding:12px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:15px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="chat">

<div id="top">
<button onclick="setMode('libre',this)" class="active">🆓 Libre</button>
<button onclick="setMode('exercice',this)">📝 Exercice</button>
<button onclick="toggleVoice()">🔊 Voix</button>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="input" placeholder="Ex: 5+3*(2+1)">
<button onclick="send()">Envoyer</button>
</div>

</div>

<script>
let mode="libre", currentAnswer=null, voice=true;

// ===== BLOQUER CLAVIER =====
const allowed="0123456789+-*/().";

input.addEventListener("keypress", (e)=>{
  if(!allowed.includes(e.key)){
    e.preventDefault();
  }
});

// ===== VOIX =====
function speak(t){
  if(!voice) return;
  let u=new SpeechSynthesisUtterance(t);
  u.lang="fr-FR";
  u.rate=0.9;
  speechSynthesis.speak(u);
}

function toggleVoice(){
  voice=!voice;
}

// ===== UI =====
function add(text,type){
  let d=document.createElement("div");
  d.textContent=text;
  d.className="message "+type;
  messages.appendChild(d);
  messages.scrollTop=messages.scrollHeight;
  if(type==="bot") speak(text);
}

function setMode(m,b){
  mode=m;
  document.querySelectorAll("#top button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  add("Mode : "+m,"bot");
  currentAnswer=null;
  if(m==="exercice") newExercise();
}

// ===== ENVOI =====
function send(){
  let t=input.value.trim();
  if(!t) return;
  add(t,"user");
  input.value="";

  if(mode==="libre") add(calculate(t),"bot");
  else check(t);
}

// ===== CALCUL PRO =====
function calculate(expr){
  try{
    let r=Function("return "+expr)();
    return `🧮 Calcul:
${expr}

✅ Résultat = ${r}`;
  }catch{
    return "❌ Erreur";
  }
}

// ===== EXERCICES =====
function newExercise(){
  let a=Math.floor(Math.random()*10)+1;
  let b=Math.floor(Math.random()*10)+1;
  currentAnswer=a+b;
  add(`📝 Calcule : ${a} + ${b}`,"bot");
}

function check(t){
  if(Number(t)==currentAnswer){
    add("✅ Correct !","bot");
  }else{
    add(`❌ Faux → ${currentAnswer}`,"bot");
  }
  newExercise();
}

// START
add("🤖 MathBot PRO++ prêt ! Tape un calcul 🔥","bot");
</script>

</body>
</html>
