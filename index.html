<!DOCTYPE html>
<html>
<head>
<title>Start Coding - PRO</title>

<style>
body {
  background: linear-gradient(135deg, #0f2027, #2c5364);
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  font-size: 40px;
}

canvas {
  border: 3px solid lime;
  background: black;
}

button {
  padding: 10px;
  font-size: 18px;
  background: red;
  color: white;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎮 Start Coding - PRO</h1>
<p>Eat burgers 🍔, grow, survive bots 🤖</p>

<canvas id="game" width="600" height="600"></canvas>
<br>
<button onclick="restart()">🔄 Restart</button>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player, bots, food;

function init() {
  player = {
    x: 300,
    y: 300,
    size: 10,
    dx: 0,
    dy: 0,
    trail: []
  };

  bots = [];
  for (let i = 0; i < 5; i++) {
    bots.push({
      x: Math.random()*600,
      y: Math.random()*600,
      size: 10,
      dx: (Math.random()-0.5)*4,
      dy: (Math.random()-0.5)*4,
      trail: []
    });
  }

  food = [];
  for (let i = 0; i < 30; i++) {
    food.push({
      x: Math.random()*600,
      y: Math.random()*600
    });
  }
}

document.addEventListener("keydown", e => {
  if(e.key === "ArrowUp") player.dy = -4, player.dx = 0;
  if(e.key === "ArrowDown") player.dy = 4, player.dx = 0;
  if(e.key === "ArrowLeft") player.dx = -4, player.dy = 0;
  if(e.key === "ArrowRight") player.dx = 4, player.dy = 0;
});

function updateSnake(snake) {
  snake.x += snake.dx;
  snake.y += snake.dy;

  snake.trail.push({x: snake.x, y: snake.y});
  if (snake.trail.length > snake.size) {
    snake.trail.shift();
  }
}

function drawSnake(snake, color) {
  ctx.fillStyle = color;
  snake.trail.forEach(p => {
    ctx.fillRect(p.x, p.y, 8, 8);
  });
}

function updateBots() {
  bots.forEach(bot => {
    if(Math.random() < 0.02){
      bot.dx = (Math.random()-0.5)*4;
      bot.dy = (Math.random()-0.5)*4;
    }
    updateSnake(bot);
  });
}

function eatFood(snake) {
  food.forEach((f, i) => {
    let dx = snake.x - f.x;
    let dy = snake.y - f.y;
    if(Math.sqrt(dx*dx+dy*dy) < 10){
      snake.size += 2;
      food.splice(i,1);
      food.push({x: Math.random()*600, y: Math.random()*600});
    }
  });
}

function drawFood() {
  food.forEach(f => {
    ctx.fillStyle = "orange";
    ctx.fillRect(f.x, f.y, 6, 6);
  });
}

function checkCollision() {
  bots.forEach(bot => {
    bot.trail.forEach(p => {
      if(Math.abs(player.x - p.x) < 5 && Math.abs(player.y - p.y) < 5){
        alert("Game Over");
        init();
      }
    });
  });
}

function gameLoop() {
  ctx.clearRect(0,0,600,600);

  updateSnake(player);
  updateBots();

  eatFood(player);
  bots.forEach(b => eatFood(b));

  checkCollision();

  drawFood();
  drawSnake(player, "lime");

  bots.forEach(b => drawSnake(b, "red"));

  requestAnimationFrame(gameLoop);
}

function restart(){
  init();
}

init();
gameLoop();
</script>

</body>
</html>
