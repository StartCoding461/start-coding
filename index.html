<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathBot ULTRA GOD</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app{
width:100%;
max-width:500px;
background:#111;
border-radius:20px;
padding:15px;
}

h1{text-align:center;font-size:22px;}

.top{
display:flex;
justify-content:center;
gap:5px;
flex-wrap:wrap;
margin-bottom:10px;
}

button{
padding:8px;
border:none;
border-radius:10px;
background:#333;
color:white;
flex:1;
}

.active{background:#00ff88;color:black;}

#display{
text-align:center;
font-size:26px;
margin:10px;
}

#input{
width:100%;
padding:15px;
font-size:22px;
border-radius:10px;
border:none;
margin-bottom:10px;
text-align:center;
}

.keypad{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.keypad button{
padding:15px;
font-size:18px;
}

#stats{
text-align:center;
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<div id="app">

<h1>🔥 ULTRA GOD</h1>

<div class="top">
<button onclick="setMode('free',this)" class="active">Libre</button>
<button onclick="setMode('game',this)">Jeu</button>
</div>

<div class="top">
<button onclick="setLevel('easy',this)" class="active">Easy</button>
<button onclick="setLevel('medium',this)">Medium</button>
<button onclick="setLevel('hard',this)">Hard</button>
<button onclick="setLevel('god',this)">GOD</button>
</div>

<div id="display">Ready...</div>
<input id="input" readonly>

<div class="keypad">
<button onclick="p('7')">7</button>
<button onclick="p('8')">8</button>
<button onclick="p('9')">9</button>
<button onclick="p('/')">/</button>

<button onclick="p('4')">4</button>
<button onclick="p('5')">5</button>
<button onclick="p('6')">6</button>
<button onclick="p('*')">*</button>

<button onclick="p('1')">1</button>
<button onclick="p('2')">2</button>
<button onclick="p('3')">3</button>
<button onclick="p('-')">-</button>

<button onclick="p('0')">0</button>
<button onclick="p('.')">.</button>
<button onclick="p('(')">(</button>
<button onclick="p(')')">)</button>

<button onclick="clearI()">C</button>
<button onclick="validate()">OK</button>
<button onclick="p('+')">+</button>
<button onclick="back()">⌫</button>
</div>

<div id="stats"></div>

</div>

<script>

// ===== SOUND =====
function beep(freq){
let ctx=new AudioContext();
let o=ctx.createOscillator();
let g=ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.frequency.value=freq;
o.start();
g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.2);
}

// ===== VAR =====
let mode="free";
let level="easy";
let score=0;
let combo=0;
let coins=Number(localStorage.getItem("coins")||0);
let best=Number(localStorage.getItem("best")||0);
let answer=0;
let time=10;
let timer;

// ===== INPUT =====
function p(v){input.value+=v;}
function clearI(){input.value="";}
function back(){input.value=input.value.slice(0,-1);}

// ===== UI ACTIVE =====
function setActive(group,btn){
group.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

// ===== MODE =====
function setMode(m,btn){
mode=m;
setActive(btn.parentNode,btn);
resetGame();
if(mode==="game") start();
}

// ===== LEVEL =====
function setLevel(l,btn){
level=l;
setActive(btn.parentNode,btn);
}

// ===== CALC =====
function calc(e){
try{return Function("return "+e)();}
catch{return null;}
}

// ===== GAME =====
function start(){
time=10;
score=0;
combo=0;
nextQ();

timer=setInterval(()=>{
time--;
updateHUD();
if(time<=0) end();
},1000);
}

function nextQ(){
let a,b,op;

if(level==="easy"){a=rand(1,10);b=rand(1,10);op="+";}
if(level==="medium"){a=rand(1,20);b=rand(1,20);op=["+","-"][rand(0,1)];}
if(level==="hard"){a=rand(1,50);b=rand(1,10);op=["+","-","*"][rand(0,2)];}
if(level==="god"){a=rand(10,100);b=rand(1,20);op=["+","-","*","/"][rand(0,3)];}

if(op==="/"){a=b*(rand(1,10));}

answer=calc(a+op+b);
display.textContent=a+" "+op+" "+b;
clearI();
}

// ===== VALIDATE =====
function validate(){
let val=Number(input.value);

if(mode==="free"){
display.textContent="= "+calc(input.value);
clearI();
return;
}

if(val===answer){
beep(600);
combo++;
score+=1+combo;
coins+=1;
time+=1;
}else{
beep(200);
combo=0;
time-=2;
}

nextQ();
updateHUD();
clearI();
}

// ===== HUD =====
function updateHUD(){
stats.textContent=`⏱ ${time}s | Score ${score} | Combo ${combo} | 💰 ${coins} | 🏆 ${best}`;
}

// ===== END =====
function end(){
clearInterval(timer);
beep(100);

if(score>best){
best=score;
localStorage.setItem("best",best);
}

localStorage.setItem("coins",coins);

alert("FIN 🔥 Score: "+score);
location.reload();
}

// ===== UTIL =====
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function resetGame(){
clearInterval(timer);
updateHUD();
}

updateHUD();

</script>

</body>
</html>
