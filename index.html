<!DOCTYPE html>
<html>
<head>
<title>Start Coding - ULTRA</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle, #1a2a3a, #0f2027);
  color:white;
  text-align:center;
}

#menu {
  padding-top:100px;
}

button {
  padding:15px;
  font-size:20px;
  margin:10px;
  background:lime;
  border:none;
}

canvas {
  display:none;
  background:black;
  border:4px solid lime;
  touch-action:none;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🎮 Start Coding</h1>
  <p>Like slither.io 🐍</p>
  <button onclick="startGame()">▶ Play</button>
</div>

<canvas id="game" width="1200" height="800"></canvas>
<br>
<button id="quitBtn" onclick="quitGame()" style="display:none;">❌ Quit</button>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player, bots, food;
let running=false;
let targetX=600,targetY=400;
let boosting=false;

let eatSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

function init(){
player={x:600,y:400,size:15,trail:[]};

bots=[];
for(let i=0;i<6;i++){
bots.push({
x:Math.random()*1200,
y:Math.random()*800,
size:15,
trail:[]
});
}

food=[];
for(let i=0;i<80;i++){
food.push({x:Math.random()*1200,y:Math.random()*800});
}
}

function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("quitBtn").style.display="inline";
running=true;
init();
}

function quitGame(){
running=false;
canvas.style.display="none";
document.getElementById("quitBtn").style.display="none";
document.getElementById("menu").style.display="block";
}

/* 🖱 souris */
canvas.addEventListener("mousemove",e=>{
let r=canvas.getBoundingClientRect();
targetX=e.clientX-r.left;
targetY=e.clientY-r.top;
});

/* 📱 tactile */
canvas.addEventListener("touchmove",e=>{
let r=canvas.getBoundingClientRect();
targetX=e.touches[0].clientX-r.left;
targetY=e.touches[0].clientY-r.top;
});

/* ⚡ boost */
canvas.addEventListener("mousedown",()=>boosting=true);
canvas.addEventListener("mouseup",()=>boosting=false);
canvas.addEventListener("touchstart",()=>boosting=true);
canvas.addEventListener("touchend",()=>boosting=false);

/* 🐍 mouvement joueur */
function movePlayer(){
let dx=targetX-player.x;
let dy=targetY-player.y;
let dist=Math.sqrt(dx*dx+dy*dy);

let speed = boosting ? 6 : 3;

if(dist>1){
player.x+=dx/dist*speed;
player.y+=dy/dist*speed;
}

player.trail.push({x:player.x,y:player.y});
if(player.trail.length>player.size) player.trail.shift();
}

/* 🤖 bots intelligents */
function updateBots(){
bots.forEach(b=>{
let closest=food[0];
let bestDist=9999;

food.forEach(f=>{
let d=(b.x-f.x)*(b.x-f.x)+(b.y-f.y)*(b.y-f.y);
if(d<bestDist){bestDist=d;closest=f;}
});

let dx=closest.x-b.x;
let dy=closest.y-b.y;
let dist=Math.sqrt(dx*dx+dy*dy);

b.x+=dx/dist*2;
b.y+=dy/dist*2;

b.trail.push({x:b.x,y:b.y});
if(b.trail.length>b.size) b.trail.shift();
});
}

/* 🍔 nourriture */
function drawFood(){
food.forEach(f=>{
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(f.x,f.y,6,0,Math.PI*2);
ctx.fill();
});
}

/* 🍔 manger */
function eatFood(s){
food.forEach((f,i)=>{
let dx=s.x-f.x;
let dy=s.y-f.y;
if(Math.sqrt(dx*dx+dy*dy)<10){
s.size+=2;
eatSound.play();
food.splice(i,1);
food.push({x:Math.random()*1200,y:Math.random()*800});
}
});
}

/* 🐍 dessin smooth */
function drawSnake(s,color){
s.trail.forEach((p,i)=>{
ctx.fillStyle=color;
ctx.beginPath();
ctx.arc(p.x,p.y,6,0,Math.PI*2);
ctx.fill();
});
}

/* 💀 collision */
function checkCollision(){
bots.forEach(b=>{
b.trail.forEach(p=>{
if(Math.abs(player.x-p.x)<6 && Math.abs(player.y-p.y)<6){
alert("💀 Game Over");
init();
}
});
});
}

function loop(){
if(!running){
requestAnimationFrame(loop);
return;
}

ctx.clearRect(0,0,1200,800);

movePlayer();
updateBots();

eatFood(player);
bots.forEach(b=>eatFood(b));

checkCollision();

drawFood();
drawSnake(player,"lime");
bots.forEach(b=>drawSnake(b,"red"));

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
