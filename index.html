<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MathBot GAME PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#app{
  width:95%;
  max-width:500px;
  background:#1c1c1c;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

#top{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#111;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  cursor:pointer;
}

.active{background:#0b84ff;}

#messages{
  height:150px;
  overflow:auto;
  padding:10px;
  background:#222;
}

.msg{padding:8px;margin:5px;border-radius:10px;}
.bot{background:#333;}
.user{background:#0b84ff;}

#display{
  padding:15px;
  background:black;
  color:#0f0;
  font-size:24px;
  text-align:right;
}

#timer{
  height:8px;
  background:red;
  width:100%;
  transition:width 1s linear;
}

#pad{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:10px;
  background:#111;
}

.key{
  padding:18px;
  background:#333;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
}

.key:hover{background:#0b84ff;}
.good{background:#0f0!important;}
.bad{background:#f00!important;}
</style>
</head>

<body>

<div id="app">

<div id="top">
<button class="active" onclick="setMode('free',this)">Libre</button>
<button onclick="setMode('game',this)">🎮 Jeu</button>
</div>

<div id="timer"></div>
<div id="messages"></div>
<div id="display">0</div>
<div id="pad"></div>

</div>

<script>

let mode="free";
let input="";
let score=0;
let best=localStorage.getItem("best")||0;
let time=10;
let currentAnswer=null;
let timer;

const display=document.getElementById("display");
const messages=document.getElementById("messages");
const bar=document.getElementById("timer");

// ===== SON =====
function beep(freq){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),100);
}

// ===== MESSAGE =====
function add(text,type){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.textContent=text;
  messages.appendChild(d);
  messages.scrollTop=messages.scrollHeight;
}

// ===== MODE =====
function setMode(m,btn){
  mode=m;
  document.querySelectorAll("#top button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  if(mode==="game"){
    startGame();
  }else{
    add("🧮 Mode libre","bot");
  }
}

// ===== KEYS =====
const keys=["7","8","9","/","4","5","6","*","1","2","3","-","0",".","(",")","+","C","="];
const pad=document.getElementById("pad");

keys.forEach(k=>{
  let b=document.createElement("div");
  b.className="key";
  b.textContent=k;
  b.onclick=()=>press(k,b);
  pad.appendChild(b);
});

// ===== PRESS =====
function press(k,btn){
  btn.classList.add("good");
  setTimeout(()=>btn.classList.remove("good"),100);

  if(k==="C"){input="";}
  else if(k==="="){validate();return;}
  else{input+=k;}

  display.textContent=input||"0";
}

// ===== LIBRE =====
function calculate(){
  try{
    let r=Function("return "+input)();
    add("🧮 "+input,"user");
    add("✅ "+r,"bot");
    beep(600);
  }catch{
    add("❌ erreur","bot");
    beep(200);
  }
  input="";
  display.textContent="0";
}

// ===== GAME =====
function startGame(){
  score=0;
  time=10;
  add("🎮 GO !","bot");
  add("🏆 Best: "+best,"bot");

  nextQ();

  clearInterval(timer);
  timer=setInterval(()=>{
    time--;
    bar.style.width=(time*10)+"%";

    if(time<=0){
      clearInterval(timer);
      add("⏱️ FIN Score: "+score,"bot");
      if(score>best){
        best=score;
        localStorage.setItem("best",best);
        add("🏆 NEW RECORD !","bot");
      }
    }
  },1000);
}

// ===== QUESTION =====
function nextQ(){
  let a=Math.floor(Math.random()*10+1);
  let b=Math.floor(Math.random()*10+1);
  let ops=["+","-","*"];
  let op=ops[Math.floor(Math.random()*ops.length)];

  currentAnswer=eval(a+op+b);
  add("👉 "+a+" "+op+" "+b,"bot");
}

// ===== VALID =====
function validate(){
  if(mode==="free"){calculate();return;}

  let val=Number(input);

  if(val===currentAnswer){
    score++;
    add("✅","bot");
    beep(800);
  }else{
    add("❌","bot");
    beep(200);
  }

  input="";
  display.textContent="0";
  nextQ();
}

// START
add("🔥 GAME PRO MAX READY","bot");

</script>

</body>
</html>
