<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f2027;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app{
width:100%;
max-width:420px;
padding:15px;
background:#111;
border-radius:15px;
}

h1{text-align:center;}

.top{
display:flex;
gap:5px;
margin-bottom:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#333;
color:white;
font-size:16px;
}

.active{background:#00ff88;color:black;}

#display{
text-align:center;
font-size:28px;
margin:10px 0;
}

#input{
width:100%;
padding:15px;
font-size:22px;
border-radius:10px;
border:none;
text-align:center;
margin-bottom:10px;
}

.keypad{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.keypad button{
padding:15px;
font-size:18px;
}

#stats{
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

<h1>🔥 Math Game</h1>

<div class="top">
<button onclick="setMode('free',this)" class="active">Libre</button>
<button onclick="setMode('game',this)">Jeu</button>
</div>

<div id="display">Tap OK</div>

<input id="input" readonly>

<div class="keypad">
<button onclick="p('7')">7</button>
<button onclick="p('8')">8</button>
<button onclick="p('9')">9</button>
<button onclick="p('/')">/</button>

<button onclick="p('4')">4</button>
<button onclick="p('5')">5</button>
<button onclick="p('6')">6</button>
<button onclick="p('*')">*</button>

<button onclick="p('1')">1</button>
<button onclick="p('2')">2</button>
<button onclick="p('3')">3</button>
<button onclick="p('-')">-</button>

<button onclick="p('0')">0</button>
<button onclick="p('.')">.</button>
<button onclick="p('(')">(</button>
<button onclick="p(')')">)</button>

<button onclick="clearI()">C</button>
<button onclick="validate()">OK</button>
<button onclick="p('+')">+</button>
<button onclick="back()">⌫</button>
</div>

<div id="stats"></div>

</div>

<script>

// ===== STATE =====
let mode="free";
let score=0;
let time=10;
let answer=0;
let timer=null;

// ===== INPUT =====
function p(v){input.value+=v;}
function clearI(){input.value="";}
function back(){input.value=input.value.slice(0,-1);}

// ===== MODE =====
function setMode(m,btn){
mode=m;
document.querySelectorAll(".top button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
reset();
}

// ===== CALC =====
function calc(e){
try{return Function("return "+e)();}
catch{return null;}
}

// ===== GAME =====
function startGame(){
time=10;
score=0;

nextQ();

timer=setInterval(()=>{
time--;
stats.textContent="⏱ "+time+" | Score "+score;

if(time<=0){
clearInterval(timer);
alert("Score: "+score);
reset();
}
},1000);
}

function nextQ(){
let a=Math.floor(Math.random()*10);
let b=Math.floor(Math.random()*10);
answer=a+b;
display.textContent=a+" + "+b;
clearI();
}

// ===== VALIDATE =====
function validate(){

if(mode==="free"){
let r=calc(input.value);
display.textContent="= "+r;
clearI();
return;
}

if(!timer){
startGame();
return;
}

let val=Number(input.value);

if(val===answer){
score++;
nextQ();
}else{
time-=1;
}

clearI();
}

// ===== RESET =====
function reset(){
clearInterval(timer);
timer=null;
display.textContent="Tap OK";
stats.textContent="";
clearI();
}

</script>

</body>
</html>
