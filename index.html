<!DOCTYPE html>
<html>
<head>
<title>Start Coding - PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

h1 {
  margin-top:20px;
}

.menu {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.gameCard {
  width:150px;
  height:150px;
  background:#111;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.gameCard:hover {
  transform:scale(1.1);
  background:#333;
}

canvas {
  margin-top:20px;
  border:4px solid lime;
  background:black;
}

.controls {
  margin-top:10px;
}
button {
  padding:10px;
  margin:5px;
  background:lime;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🎮 Start Coding - Game Hub</h1>

<div id="menu" class="menu">
  <div class="gameCard" onclick="startSnake()">🐍 Snake.io</div>
  <div class="gameCard" onclick="startClick()">⚡ Click Game</div>
</div>

<canvas id="game" width="900" height="550"></canvas>

<div class="controls">
  <button onclick="goMenu()">🏠 Menu</button>
  <button onclick="restart()">🔄 Restart</button>
</div>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let game="menu";
let snake=[], bots=[], food=[];
let mouseX=450, mouseY=275;

canvas.addEventListener("mousemove",(e)=>{
  let rect=canvas.getBoundingClientRect();
  mouseX=e.clientX-rect.left;
  mouseY=e.clientY-rect.top;
});

// ================= SNAKE =================
function startSnake(){
  game="snake";
  snake=[{x:450,y:275}];
  bots=[];
  food=[];

  for(let i=0;i<6;i++){
    bots.push({x:Math.random()*900,y:Math.random()*550});
  }

  for(let i=0;i<150;i++){
    food.push({x:Math.random()*900,y:Math.random()*550});
  }

  loop();
}

function updateSnake(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,900,550);

  // food
  ctx.fillStyle="orange";
  food.forEach(f=>ctx.fillRect(f.x,f.y,6,6));

  // snake
  ctx.fillStyle="lime";
  snake.forEach(s=>ctx.fillRect(s.x,s.y,8,8));

  // movement smooth
  snake[0].x += (mouseX - snake[0].x)*0.05;
  snake[0].y += (mouseY - snake[0].y)*0.05;

  // bots
  ctx.fillStyle="red";
  bots.forEach(b=>{
    b.x += Math.random()*6-3;
    b.y += Math.random()*6-3;
    ctx.fillRect(b.x,b.y,8,8);

    // kill bot
    if(Math.abs(b.x-snake[0].x)<10 && Math.abs(b.y-snake[0].y)<10){
      for(let i=0;i<15;i++){
        food.push({x:b.x,y:b.y});
      }
      b.x=Math.random()*900;
      b.y=Math.random()*550;
    }
  });

  // eat food
  food = food.filter(f=>{
    if(Math.abs(f.x-snake[0].x)<10 && Math.abs(f.y-snake[0].y)<10){
      snake.push({...snake[snake.length-1]});
      return false;
    }
    return true;
  });
}

// ================= CLICK GAME =================
let clickScore=0, clickTime=10, clickRunning=false;

function startClick(){
  game="click";
  clickScore=0;
  clickTime=10;
  clickRunning=true;

  let timer=setInterval(()=>{
    clickTime--;
    if(clickTime<=0){
      clearInterval(timer);
      clickRunning=false;
      alert("🔥 Score: "+clickScore);
    }
  },1000);

  canvas.onclick=()=>{
    if(clickRunning) clickScore++;
  };

  loop();
}

function updateClick(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,900,550);

  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("Clicks: "+clickScore,350,250);
  ctx.fillText("Time: "+clickTime,370,300);
}

// ================= LOOP =================
function loop(){
  if(game==="snake") updateSnake();
  if(game==="click") updateClick();

  requestAnimationFrame(loop);
}

// ================= MENU =================
function goMenu(){
  game="menu";
  ctx.clearRect(0,0,900,550);
}

// restart
function restart(){
  if(game==="snake") startSnake();
  if(game==="click") startClick();
}
</script>

</body>
</html>
