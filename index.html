<!DOCTYPE html>
<html>
<head>
<title>Start Coding - Game Hub</title>

<style>
body {
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

header {
    padding:20px;
    font-size:30px;
    box-shadow:0 0 20px lime;
}

.grid {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:20px;
}

.game {
    width:150px;
    height:150px;
    border:2px solid lime;
    overflow:hidden;
    cursor:pointer;
}

.game img {
    width:100%;
    height:100%;
    object-fit:cover;
}

#backBtn {
    display:none;
    margin:10px;
    padding:10px;
    border:2px solid lime;
    background:black;
    color:lime;
    cursor:pointer;
}

canvas {
    display:none;
    background:#111;
    margin-top:20px;
}

#clickGame {
    display:none;
}
</style>

</head>

<body>

<header>🎮 Start Coding</header>

<button id="backBtn" onclick="goBack()">⬅ Back</button>

<div id="menu" class="grid">

<div class="game" onclick="launchSnake()">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Snake_icon.png">
</div>

<div class="game" onclick="launchClick()">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
</div>

<div class="game" onclick="launchDodge()">
<img src="https://cdn-icons-png.flaticon.com/512/854/854878.png">
</div>

</div>

<canvas id="game" width="400" height="400"></canvas>

<div id="clickGame">
<h2>Click Fast!</h2>
<button onclick="addScore()">CLICK</button>
<p id="clickScore">Score: 0</p>
</div>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let currentGame=null;

// MENU
function showGame(){
document.getElementById("menu").style.display="none";
document.getElementById("backBtn").style.display="inline-block";
}

function goBack(){
location.reload();
}

// SNAKE
let snake,dx,dy,food,score;

function launchSnake(){
currentGame="snake";
showGame();
canvas.style.display="block";

snake=[{x:200,y:200}];
dx=20;dy=0;
food={x:100,y:100};
score=0;
}

function drawSnake(){
ctx.fillStyle="#111";
ctx.fillRect(0,0,400,400);

let head={x:snake[0].x+dx,y:snake[0].y+dy};

if(head.x<0||head.x>=400||head.y<0||head.y>=400){
alert("Game Over Score:"+score);
goBack();
}

snake.unshift(head);

if(head.x===food.x&&head.y===food.y){
food.x=Math.floor(Math.random()*20)*20;
food.y=Math.floor(Math.random()*20)*20;
score++;
}else{
snake.pop();
}

ctx.fillStyle="lime";
snake.forEach(s=>ctx.fillRect(s.x,s.y,20,20));

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,20,20);
}

// CLICK GAME
let clickScore=0;

function launchClick(){
currentGame="click";
showGame();
document.getElementById("clickGame").style.display="block";
}

function addScore(){
clickScore++;
document.getElementById("clickScore").innerText="Score: "+clickScore;
}

// DODGE GAME
let playerX=200;
let blocks=[];

function launchDodge(){
currentGame="dodge";
showGame();
canvas.style.display="block";
blocks=[];
playerX=200;
}

function drawDodge(){
ctx.fillStyle="#111";
ctx.fillRect(0,0,400,400);

// player
ctx.fillStyle="lime";
ctx.fillRect(playerX,350,40,10);

// blocks
ctx.fillStyle="red";
blocks.forEach(b=>{
b.y+=5;
ctx.fillRect(b.x,b.y,20,20);

if(b.y>350 && b.x<playerX+40 && b.x+20>playerX){
alert("Game Over");
goBack();
}
});

// new blocks
if(Math.random()<0.05){
blocks.push({x:Math.random()*380,y:0});
}
}

// CONTROLS
document.addEventListener("keydown",e=>{
if(currentGame==="snake"){
if(e.key==="ArrowUp"){dx=0;dy=-20;}
if(e.key==="ArrowDown"){dx=0;dy=20;}
if(e.key==="ArrowLeft"){dx=-20;dy=0;}
if(e.key==="ArrowRight"){dx=20;dy=0;}
}

if(currentGame==="dodge"){
if(e.key==="ArrowLeft"){playerX-=20;}
if(e.key==="ArrowRight"){playerX+=20;}
}
});

// LOOP
setInterval(()=>{
if(currentGame==="snake") drawSnake();
if(currentGame==="dodge") drawDodge();
},100);

</script>

</body>
</html>
