<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MathBot ULTRA GOD</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app{
width:95%;
max-width:900px;
background:#111;
border-radius:20px;
padding:20px;
box-shadow:0 0 30px #000;
}

h1{text-align:center;}

#display{
text-align:center;
font-size:28px;
margin:15px;
}

#input{
width:100%;
padding:15px;
font-size:22px;
border-radius:10px;
border:none;
margin-bottom:10px;
text-align:center;
}

.keypad{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.keypad button{
padding:15px;
font-size:18px;
background:#222;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.keypad button:hover{
background:#00ff88;
color:black;
}

#stats{
text-align:center;
margin-top:10px;
}

.flash{
animation:flash 0.2s;
}

@keyframes flash{
0%{background:#0f0;}
100%{background:#111;}
}

.error{
animation:error 0.2s;
}

@keyframes error{
0%{background:#f00;}
100%{background:#111;}
}
</style>
</head>

<body>

<div id="app">

<h1>🔥 ULTRA GOD</h1>

<div id="display">Ready...</div>

<input id="input" readonly>

<div class="keypad">
<button onclick="p('7')">7</button>
<button onclick="p('8')">8</button>
<button onclick="p('9')">9</button>
<button onclick="p('/')">/</button>

<button onclick="p('4')">4</button>
<button onclick="p('5')">5</button>
<button onclick="p('6')">6</button>
<button onclick="p('*')">*</button>

<button onclick="p('1')">1</button>
<button onclick="p('2')">2</button>
<button onclick="p('3')">3</button>
<button onclick="p('-')">-</button>

<button onclick="p('0')">0</button>
<button onclick="p('.')">.</button>
<button onclick="p('(')">(</button>
<button onclick="p(')')">)</button>

<button onclick="clearI()">C</button>
<button onclick="validate()">OK</button>
<button onclick="p('+')">+</button>
<button onclick="back()">⌫</button>
</div>

<div id="stats"></div>

</div>

<script>

let score=0;
let combo=0;
let coins=Number(localStorage.getItem("coins")||0);
let best=Number(localStorage.getItem("best")||0);

let answer=0;
let time=10;
let speed=1000;

function p(v){input.value+=v;}
function clearI(){input.value="";}
function back(){input.value=input.value.slice(0,-1);}

function calc(e){
try{return Function("return "+e)();}
catch{return null;}
}

function newQ(){
let a=Math.floor(Math.random()*50)+1;
let b=Math.floor(Math.random()*50)+1;
let ops=["+","-","*"];
let op=ops[Math.floor(Math.random()*ops.length)];

if(score>10) op="/";

if(op==="/"){
b=Math.floor(Math.random()*9)+1;
a=b*(Math.floor(Math.random()*10)+1);
}

answer=calc(a+op+b);

display.textContent=a+" "+op+" "+b;
clearI();
}

function start(){
newQ();

setInterval(()=>{
time--;
stats.textContent="⏱ "+time+" | Score "+score+" | Combo "+combo+" | 💰 "+coins;

if(time<=0){
end();
}
},1000);
}

function validate(){
let val=Number(input.value);

if(val===answer){

// combo
combo++;
let gain=1+combo;

// crit
if(combo>=3) gain*=2;

score+=gain;
coins+=gain;

display.classList.add("flash");
setTimeout(()=>display.classList.remove("flash"),200);

// speed up
if(speed>300) speed-=10;

time+=1;

newQ();

}else{

combo=0;

display.classList.add("error");
setTimeout(()=>display.classList.remove("error"),200);

time-=2;
}

clearI();
}

function end(){
if(score>best){
best=score;
localStorage.setItem("best",best);
}

localStorage.setItem("coins",coins);

alert("🔥 FIN\nScore: "+score+"\nBest: "+best+"\nCoins: "+coins);

location.reload();
}

start();

</script>

</body>
</html>
