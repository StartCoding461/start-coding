<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Coding - Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    font-size: 30px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #222;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}
.card:hover { transform: scale(1.05); }

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card p { text-align: center; padding: 10px; }

#gameContainer {
    display: none;
    text-align: center;
}

canvas {
    background: black;
    border: 3px solid lime;
    margin-top: 10px;
}

button {
    margin: 10px;
    padding: 10px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🎮 Start Coding - PRO</header>

<div class="grid" id="menu">

    <div class="card" onclick="startSnake()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Snake_game_icon.png">
        <p>Snake .io</p>
    </div>

    <div class="card" onclick="startClicker()">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
        <p>Click Challenge</p>
    </div>

</div>

<div id="gameContainer">
    <button onclick="backMenu()">⬅ Back</button>
    <canvas id="game" width="500" height="500"></canvas>
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");
let loop;

/* MENU */
function showGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("gameContainer").style.display="block";
}

function backMenu(){
    clearInterval(loop);
    location.reload();
}

/* 🔥 SNAKE PRO */
function startSnake(){
    showGame();

    let snake = [{x:250,y:250}];
    let dx=20, dy=0;
    let foods=[];

    // generate many burgers
    for(let i=0;i<20;i++){
        foods.push({
            x:Math.floor(Math.random()*25)*20,
            y:Math.floor(Math.random()*25)*20
        });
    }

    document.onkeydown=e=>{
        if(e.key==="ArrowUp"){dx=0;dy=-20;}
        if(e.key==="ArrowDown"){dx=0;dy=20;}
        if(e.key==="ArrowLeft"){dx=-20;dy=0;}
        if(e.key==="ArrowRight"){dx=20;dy=0;}
    };

    loop=setInterval(()=>{
        ctx.fillStyle="black";
        ctx.fillRect(0,0,500,500);

        // draw food 🍔
        ctx.fillStyle="orange";
        foods.forEach(f=>ctx.fillRect(f.x,f.y,15,15));

        // snake body
        ctx.fillStyle="lime";
        snake.forEach((s,i)=>{
            ctx.fillRect(s.x,s.y,20,20);
        });

        let head={x:snake[0].x+dx,y:snake[0].y+dy};

        if(head.x<0||head.y<0||head.x>=500||head.y>=500){
            clearInterval(loop);
            alert("Game Over");
            return;
        }

        snake.unshift(head);

        // eat
        foods = foods.filter(f=>{
            if(head.x===f.x && head.y===f.y){
                // add new food
                foods.push({
                    x:Math.floor(Math.random()*25)*20,
                    y:Math.floor(Math.random()*25)*20
                });
                return false;
            }
            return true;
        });

        snake.pop();

    },80);
}

/* 🖱 CLICK GAME PRO */
function startClicker(){
    showGame();

    let score=0;
    let time=10;

    loop=setInterval(()=>{
        ctx.fillStyle="#111";
        ctx.fillRect(0,0,500,500);

        ctx.fillStyle="white";
        ctx.font="30px Arial";
        ctx.fillText("Score: "+score,150,200);
        ctx.fillText("Time: "+time,150,250);

    },50);

    let timer=setInterval(()=>{
        time--;
        if(time<=0){
            clearInterval(loop);
            clearInterval(timer);

            let best = localStorage.getItem("record") || 0;
            if(score>best){
                localStorage.setItem("record",score);
                alert("🔥 NEW RECORD: "+score);
            } else {
                alert("Score: "+score+" | Record: "+best);
            }
        }
    },1000);

    canvas.onclick=()=>{
        score++;
    };
}
</script>

</body>
</html>
