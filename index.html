<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Coding - Games</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.menu {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
}

.game {
    cursor: pointer;
    transition: 0.3s;
}

.game img {
    width: 150px;
    border-radius: 15px;
}

.game:hover {
    transform: scale(1.1);
}

#gameContainer {
    display: none;
    margin-top: 20px;
}

canvas {
    background: #111;
    border: 2px solid lime;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🎮 Start Coding</h1>
<p>Play games and explore real code!</p>

<div class="menu">
    <div class="game" onclick="startGame()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Snake_game_icon.png">
        <p>Snake Game</p>
    </div>
</div>

<div id="gameContainer">
    <canvas id="game" width="400" height="400"></canvas><br>
    <button onclick="quitGame()">Quit Game</button>
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let snake, food, dx, dy, gameLoop;

function startGame() {
    document.querySelector(".menu").style.display = "none";
    document.getElementById("gameContainer").style.display = "block";

    snake = [{x:200,y:200}];
    food = {x:100,y:100};
    dx = 20;
    dy = 0;

    gameLoop = setInterval(draw, 100);
}

function quitGame() {
    clearInterval(gameLoop);
    location.reload();
}

function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,400,400);

    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, 20, 20);

    ctx.fillStyle = "lime";
    snake.forEach(s => ctx.fillRect(s.x, s.y, 20, 20));

    let head = {x: snake[0].x + dx, y: snake[0].y + dy};

    if(head.x<0 || head.y<0 || head.x>=400 || head.y>=400) {
        clearInterval(gameLoop);
        alert("Game Over");
        location.reload();
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y) {
        food = {
            x: Math.floor(Math.random()*20)*20,
            y: Math.floor(Math.random()*20)*20
        };
    } else {
        snake.pop();
    }
}

document.addEventListener("keydown", e => {
    if(e.key==="ArrowUp") {dx=0; dy=-20;}
    if(e.key==="ArrowDown") {dx=0; dy=20;}
    if(e.key==="ArrowLeft") {dx=-20; dy=0;}
    if(e.key==="ArrowRight") {dx=20; dy=0;}
});
</script>

</body>
</html>
