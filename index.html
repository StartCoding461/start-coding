<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Coding - Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    font-size: 30px;
    font-weight: bold;
}

/* GAME GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #222;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card p {
    text-align: center;
    padding: 10px;
}

/* GAME AREA */
#gameContainer {
    display: none;
    text-align: center;
}

canvas {
    background: black;
    border: 3px solid lime;
    margin-top: 20px;
}

button {
    margin: 10px;
    padding: 10px 20px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🎮 Start Coding - Game Hub</header>

<div class="grid" id="menu">
    
    <div class="card" onclick="startSnake()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Snake_game_icon.png">
        <p>Snake Game</p>
    </div>

    <div class="card" onclick="startClicker()">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
        <p>Clicker Game</p>
    </div>

</div>

<div id="gameContainer">
    <button onclick="backMenu()">⬅ Back</button>
    <canvas id="game" width="400" height="400"></canvas>
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");
let loop;

/* MENU NAV */
function startSnake() {
    showGame();
    snakeGame();
}

function startClicker() {
    showGame();
    clickerGame();
}

function showGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameContainer").style.display = "block";
}

function backMenu() {
    clearInterval(loop);
    location.reload();
}

/* SNAKE GAME */
function snakeGame() {
    let snake = [{x:200,y:200}];
    let food = {x:100,y:100};
    let dx = 20, dy = 0;

    document.onkeydown = e => {
        if(e.key==="ArrowUp") {dx=0; dy=-20;}
        if(e.key==="ArrowDown") {dx=0; dy=20;}
        if(e.key==="ArrowLeft") {dx=-20; dy=0;}
        if(e.key==="ArrowRight") {dx=20; dy=0;}
    };

    loop = setInterval(() => {
        ctx.fillStyle = "black";
        ctx.fillRect(0,0,400,400);

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, 20, 20);

        ctx.fillStyle = "lime";
        snake.forEach(s => ctx.fillRect(s.x, s.y, 20, 20));

        let head = {x: snake[0].x + dx, y: snake[0].y + dy};

        if(head.x<0||head.y<0||head.x>=400||head.y>=400){
            clearInterval(loop);
            alert("Game Over");
            return;
        }

        snake.unshift(head);

        if(head.x===food.x && head.y===food.y){
            food = {
                x: Math.floor(Math.random()*20)*20,
                y: Math.floor(Math.random()*20)*20
            };
        } else {
            snake.pop();
        }

    },100);
}

/* CLICKER GAME */
function clickerGame() {
    let score = 0;

    loop = setInterval(() => {
        ctx.fillStyle = "#111";
        ctx.fillRect(0,0,400,400);

        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("Score: " + score, 120, 200);
    },50);

    canvas.onclick = () => {
        score++;
    };
}
</script>

</body>
</html>
