<!DOCTYPE html>
<html>
<head>
<title>Start Coding - Game Hub</title>
<style>
body {
  background: linear-gradient(135deg,#111,#222);
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  border: 3px solid lime;
  background: black;
}

button {
  padding: 10px;
  margin: 5px;
  background: lime;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.menu {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎮 Start Coding</h1>

<div id="menu" class="menu">
  <button onclick="startSnake()">Play Snake.io</button>
  <button onclick="startClick()">Click Game</button>
</div>

<canvas id="game" width="800" height="500"></canvas>

<div>
  <button onclick="restart()">🔄 Restart</button>
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let snake, bots, food, gameRunning=false;

function startSnake(){
  gameRunning=true;
  snake = [{x:400,y:250}];
  bots = [];
  food = [];

  // bots
  for(let i=0;i<5;i++){
    bots.push({x:Math.random()*800,y:Math.random()*500,dx:1,dy:1});
  }

  // food
  for(let i=0;i<100;i++){
    food.push({x:Math.random()*800,y:Math.random()*500});
  }

  loop();
}

function loop(){
  if(!gameRunning) return;

  ctx.fillStyle="black";
  ctx.fillRect(0,0,800,500);

  // draw food
  ctx.fillStyle="orange";
  food.forEach(f=>ctx.fillRect(f.x,f.y,5,5));

  // draw snake
  ctx.fillStyle="lime";
  snake.forEach(s=>ctx.fillRect(s.x,s.y,6,6));

  // move snake toward mouse
  snake[0].x += (mouseX - snake[0].x)*0.05;
  snake[0].y += (mouseY - snake[0].y)*0.05;

  // bots
  ctx.fillStyle="red";
  bots.forEach(b=>{
    b.x += Math.random()*4-2;
    b.y += Math.random()*4-2;
    ctx.fillRect(b.x,b.y,6,6);

    // collision with player
    if(Math.abs(b.x-snake[0].x)<10 && Math.abs(b.y-snake[0].y)<10){
      // bot dies → drop food
      for(let i=0;i<10;i++){
        food.push({x:b.x,y:b.y});
      }
      b.x=Math.random()*800;
      b.y=Math.random()*500;
    }
  });

  // eat food
  food = food.filter(f=>{
    if(Math.abs(f.x-snake[0].x)<10 && Math.abs(f.y-snake[0].y)<10){
      snake.push({...snake[snake.length-1]});
      return false;
    }
    return true;
  });

  requestAnimationFrame(loop);
}

// mouse control
let mouseX=400, mouseY=250;
canvas.addEventListener("mousemove",(e)=>{
  let rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

// CLICK GAME
function startClick(){
  let score=0;
  let time=10;

  let interval = setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(interval);
      alert("Score: "+score);
    }
  },1000);

  canvas.onclick = ()=>{
    score++;
  };
}

// restart
function restart(){
  location.reload();
}
</script>

</body>
</html>
