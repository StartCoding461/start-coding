<!DOCTYPE html>
<html>
<head>
<title>Start Coding - Game Hub</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.menu {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#222;
  padding:20px;
  cursor:pointer;
  border-radius:10px;
}

canvas {
  display:none;
  border:3px solid lime;
  background:black;
}
</style>
</head>

<body>

<h1>🎮 Start Coding</h1>

<div class="menu" id="menu">
  <div class="card" onclick="snakeGame()">🐍 Snake.io</div>
  <div class="card" onclick="clickGame()">🖱 Click Game</div>
  <div class="card" onclick="dodgeGame()">⚡ Dodge</div>
  <div class="card" onclick="runnerGame()">🏃 Runner</div>
</div>

<canvas id="game" width="900" height="600"></canvas>
<br>
<button onclick="back()">⬅ Back</button>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");
let loop;

/* MENU */
function showGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
}
function back(){
  clearInterval(loop);
  location.reload();
}

/* 🐍 SNAKE AVEC KILL + LOOT */
function snakeGame(){
  showGame();

  let player={x:400,y:300,size:10,trail:[]};
  let bots=[];
  let food=[];

  for(let i=0;i<5;i++){
    bots.push({x:Math.random()*900,y:Math.random()*600,size:10,trail:[]});
  }

  for(let i=0;i<30;i++){
    food.push({x:Math.random()*900,y:Math.random()*600});
  }

  document.onmousemove=e=>{
    player.x=e.offsetX;
    player.y=e.offsetY;
  };

  loop=setInterval(()=>{
    ctx.clearRect(0,0,900,600);

    /* FOOD */
    ctx.fillStyle="orange";
    food.forEach(f=>ctx.fillRect(f.x,f.y,6,6));

    /* PLAYER */
    player.trail.push({x:player.x,y:player.y});
    if(player.trail.length>player.size) player.trail.shift();

    ctx.fillStyle="lime";
    player.trail.forEach(p=>ctx.fillRect(p.x,p.y,8,8));

    /* BOTS */
    bots.forEach((b,i)=>{
      b.x+=(Math.random()-0.5)*5;
      b.y+=(Math.random()-0.5)*5;

      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>b.size) b.trail.shift();

      ctx.fillStyle="red";
      b.trail.forEach(p=>ctx.fillRect(p.x,p.y,8,8));

      /* KILL BOT */
      b.trail.forEach(p=>{
        if(Math.abs(player.x-p.x)<6 && Math.abs(player.y-p.y)<6){
          // loot
          for(let k=0;k<10;k++){
            food.push({x:b.x,y:b.y});
          }
          bots.splice(i,1);
        }
      });
    });

    /* EAT */
    food.forEach((f,i)=>{
      if(Math.abs(player.x-f.x)<10 && Math.abs(player.y-f.y)<10){
        player.size+=1;
        food.splice(i,1);
      }
    });

  },50);
}

/* 🖱 CLICK GAME */
function clickGame(){
  showGame();

  let score=0;
  let time=10;

  canvas.onclick=()=>score++;

  let timer=setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(timer);
      clearInterval(loop);
      alert("Score: "+score);
    }
  },1000);

  loop=setInterval(()=>{
    ctx.clearRect(0,0,900,600);
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("Score: "+score,350,250);
    ctx.fillText("Time: "+time,350,300);
  },50);
}

/* ⚡ DODGE GAME */
function dodgeGame(){
  showGame();

  let player={x:400,y:300};
  let enemies=[];

  document.onmousemove=e=>{
    player.x=e.offsetX;
    player.y=e.offsetY;
  };

  loop=setInterval(()=>{
    ctx.clearRect(0,0,900,600);

    enemies.push({x:Math.random()*900,y:0});

    enemies.forEach(e=>{
      e.y+=5;
      ctx.fillStyle="red";
      ctx.fillRect(e.x,e.y,10,10);

      if(Math.abs(player.x-e.x)<10 && Math.abs(player.y-e.y)<10){
        alert("Game Over");
        location.reload();
      }
    });

    ctx.fillStyle="lime";
    ctx.fillRect(player.x,player.y,10,10);

  },50);
}

/* 🏃 RUNNER */
function runnerGame(){
  showGame();

  let player={x:100,y:500,vy:0};
  let gravity=1;
  let obstacles=[];

  document.onkeydown=e=>{
    if(e.key===" " && player.y>=500){
      player.vy=-15;
    }
  };

  loop=setInterval(()=>{
    ctx.clearRect(0,0,900,600);

    player.vy+=gravity;
    player.y+=player.vy;

    if(player.y>500){
      player.y=500;
      player.vy=0;
    }

    obstacles.push({x:900,y:520});

    obstacles.forEach(o=>{
      o.x-=5;
      ctx.fillRect(o.x,o.y,20,20);

      if(Math.abs(player.x-o.x)<20 && Math.abs(player.y-o.y)<20){
        alert("Game Over");
        location.reload();
      }
    });

    ctx.fillStyle="lime";
    ctx.fillRect(player.x,player.y,20,20);

  },50);
}
</script>

</body>
</html>
