<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Coding - PRO</title>

<style>
body{
    margin:0;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
    font-family:Arial;
}

h1{margin:10px;}

#gameCanvas{
    border:4px solid lime;
    background:black;
    display:none;
}

.menu{
    margin-top:100px;
}

button{
    padding:12px 20px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:lime;
}

#ui{
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🎮 Start Coding - PRO</h1>

<div class="menu" id="menu">
    <h2>Play Snake.io Style Game</h2>
    <button onclick="startGame()">▶ Play</button>
</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<div id="ui" style="display:none;">
    <button onclick="backMenu()">🏠 Menu</button>
    <button onclick="restartGame()">🔄 Restart</button>
</div>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let player, foods, bots, mouseX=450, mouseY=250;
let running=false;

canvas.addEventListener("mousemove",(e)=>{
    let rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});

// MOBILE
canvas.addEventListener("touchmove",(e)=>{
    let rect = canvas.getBoundingClientRect();
    mouseX = e.touches[0].clientX - rect.left;
    mouseY = e.touches[0].clientY - rect.top;
});

function startGame(){
    document.getElementById("menu").style.display="none";
    canvas.style.display="block";
    document.getElementById("ui").style.display="block";

    init();
    running=true;
    gameLoop();
}

function backMenu(){
    running=false;
    canvas.style.display="none";
    document.getElementById("ui").style.display="none";
    document.getElementById("menu").style.display="block";
}

function restartGame(){
    init();
}

function init(){
    player = {
        x:450,y:250,
        size:10,
        tail:[],
        speed:2
    };

    foods=[];
    for(let i=0;i<150;i++){
        foods.push({
            x:Math.random()*900,
            y:Math.random()*500,
            size:5
        });
    }

    bots=[];
    for(let i=0;i<5;i++){
        bots.push({
            x:Math.random()*900,
            y:Math.random()*500,
            size:10,
            tail:[],
            dirX:Math.random()*2-1,
            dirY:Math.random()*2-1
        });
    }
}

function gameLoop(){
    if(!running) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function update(){

    // PLAYER FOLLOW MOUSE
    let dx = mouseX - player.x;
    let dy = mouseY - player.y;
    let dist = Math.sqrt(dx*dx+dy*dy);

    player.x += dx/dist * player.speed;
    player.y += dy/dist * player.speed;

    player.tail.push({x:player.x,y:player.y});
    if(player.tail.length > player.size) player.tail.shift();

    // EAT FOOD
    foods.forEach((f,i)=>{
        let d = Math.hypot(player.x-f.x, player.y-f.y);
        if(d < player.size){
            foods.splice(i,1);
            player.size += 2;

            foods.push({
                x:Math.random()*900,
                y:Math.random()*500,
                size:5
            });
        }
    });

    // BOTS
    bots.forEach(bot=>{
        bot.x += bot.dirX*2;
        bot.y += bot.dirY*2;

        if(Math.random()<0.02){
            bot.dirX=Math.random()*2-1;
            bot.dirY=Math.random()*2-1;
        }

        bot.tail.push({x:bot.x,y:bot.y});
        if(bot.tail.length > bot.size) bot.tail.shift();

        // PLAYER KILLS BOT
        let d = Math.hypot(player.x-bot.x, player.y-bot.y);
        if(d < player.size){
            // drop food
            for(let i=0;i<20;i++){
                foods.push({
                    x:bot.x+Math.random()*30-15,
                    y:bot.y+Math.random()*30-15,
                    size:5
                });
            }

            bot.x=Math.random()*900;
            bot.y=Math.random()*500;
            bot.size=10;
            bot.tail=[];
        }
    });
}

function draw(){
    ctx.clearRect(0,0,900,500);

    // FOOD
    ctx.fillStyle="orange";
    foods.forEach(f=>{
        ctx.fillRect(f.x,f.y,f.size,f.size);
    });

    // PLAYER
    ctx.fillStyle="lime";
    player.tail.forEach(p=>{
        ctx.fillRect(p.x,p.y,5,5);
    });

    // BOTS
    ctx.fillStyle="red";
    bots.forEach(bot=>{
        bot.tail.forEach(p=>{
            ctx.fillRect(p.x,p.y,5,5);
        });
    });
}
</script>

</body>
</html>
