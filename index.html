<!DOCTYPE html>
<html>
<head>
<title>Start Coding - Games</title>

<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    margin:0;
    text-align:center;
}

header {
    padding:20px;
    font-size:30px;
    box-shadow:0 0 20px lime;
}

.grid {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:20px;
}

.game {
    width:150px;
    height:150px;
    background:#111;
    border:2px solid lime;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.3s;
}

.game:hover {
    transform:scale(1.1);
    box-shadow:0 0 20px lime;
}

canvas {
    background:#111;
    margin-top:20px;
    display:none;
}
</style>

</head>

<body>

<header>🎮 Start Coding</header>

<div id="menu" class="grid">
    <div class="game" onclick="launchSnake()">🐍 Snake</div>
    <div class="game" onclick="launchClick()">⚡ Click Game</div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

function launchSnake() {
    document.getElementById("menu").style.display="none";
    canvas.style.display="block";
    startSnake();
}

function launchClick() {
    document.getElementById("menu").style.display="none";
    alert("Coming soon 🚀");
}

let snake, dx, dy, food;

function startSnake() {
    snake=[{x:200,y:200}];
    dx=20; dy=0;
    food={x:100,y:100};
}

function draw() {
    ctx.fillStyle="#111";
    ctx.fillRect(0,0,400,400);

    let head={x:snake[0].x+dx,y:snake[0].y+dy};

    if(head.x<0||head.x>=400||head.y<0||head.y>=400){
        alert("Game Over");
        location.reload();
    }

    snake.unshift(head);

    if(head.x===food.x&&head.y===food.y){
        food.x=Math.floor(Math.random()*20)*20;
        food.y=Math.floor(Math.random()*20)*20;
    } else {
        snake.pop();
    }

    ctx.fillStyle="lime";
    snake.forEach(s=>ctx.fillRect(s.x,s.y,20,20));

    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,20,20);
}

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp"){dx=0;dy=-20;}
    if(e.key==="ArrowDown"){dx=0;dy=20;}
    if(e.key==="ArrowLeft"){dx=-20;dy=0;}
    if(e.key==="ArrowRight"){dx=20;dy=0;}
});

setInterval(draw,100);
</script>

</body>
</html>
